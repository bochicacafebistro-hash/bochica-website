<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Photo du plat à venir">
  <defs>
    <radialGradient id="plateBg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="55%" stop-color="#221812"/>
      <stop offset="100%" stop-color="#120c08"/>
    </radialGradient>
    <radialGradient id="plateInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a3524"/>
      <stop offset="70%" stop-color="#2e2013"/>
      <stop offset="100%" stop-color="#241609"/>
    </radialGradient>
    <linearGradient id="steam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f1e8" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#f5f1e8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#plateBg)"/>

  <!-- Steam wisps -->
  <path d="M150 40 Q160 10 170 40 T190 40" stroke="url(#steam)" stroke-width="3" fill="none" opacity=".55"/>
  <path d="M215 30 Q225 5 235 30 T255 30" stroke="url(#steam)" stroke-width="3" fill="none" opacity=".45"/>

  <!-- Plate -->
  <ellipse cx="200" cy="175" rx="135" ry="60" fill="#1a120a" opacity=".85"/>
  <ellipse cx="200" cy="170" rx="130" ry="57" fill="url(#plateInner)"/>
  <ellipse cx="200" cy="168" rx="110" ry="46" fill="none" stroke="#f7c81e" stroke-width="1" opacity=".25"/>

  <!-- Stylised food shapes on plate -->
  <ellipse cx="175" cy="165" rx="32" ry="18" fill="#8a5a2a" opacity=".85"/>
  <ellipse cx="215" cy="158" rx="28" ry="14" fill="#b8792f" opacity=".8"/>
  <ellipse cx="235" cy="175" rx="20" ry="10" fill="#e74c3c" opacity=".55"/>
  <ellipse cx="190" cy="182" rx="22" ry="9" fill="#7dbf66" opacity=".5"/>
  <circle cx="225" cy="148" r="5" fill="#f7c81e" opacity=".85"/>
  <circle cx="165" cy="152" r="4" fill="#f7c81e" opacity=".75"/>

  <!-- Logo "B" centered above plate -->
  <g transform="translate(200 100)" opacity=".42">
    <circle r="26" fill="#f7c81e" opacity=".12"/>
    <text x="0" y="9" font-family="Bebas Neue, Impact, sans-serif" font-size="36" font-weight="700"
      fill="#f7c81e" text-anchor="middle" letter-spacing="2">B</text>
  </g>

  <!-- Subtle photo-coming hint at bottom -->
  <text x="200" y="265" font-family="Inter, system-ui, sans-serif" font-size="9"
    fill="#f5f1e8" fill-opacity=".32" text-anchor="middle" letter-spacing="4">
    BOCHICA · PHOTO À VENIR
  </text>
</svg>
